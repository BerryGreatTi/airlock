name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build Go CLI (macOS arm64)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags "-X github.com/taeikkim92/airlock/internal/cli.Version=$VERSION" \
            -o airlock-darwin-arm64 ./cmd/airlock

      - name: Build Go CLI (macOS amd64)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          GOOS=darwin GOARCH=amd64 go build \
            -ldflags "-X github.com/taeikkim92/airlock/internal/cli.Version=$VERSION" \
            -o airlock-darwin-amd64 ./cmd/airlock

      - name: Build Go CLI (Linux amd64)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X github.com/taeikkim92/airlock/internal/cli.Version=$VERSION" \
            -o airlock-linux-amd64 ./cmd/airlock

      - name: Create universal macOS CLI binary
        run: |
          lipo -create -output airlock-darwin-universal airlock-darwin-arm64 airlock-darwin-amd64

      - name: Run Go tests
        run: go test -race ./internal/...

      - name: Run GUI tests
        run: cd AirlockApp && swift test

      - name: Package GUI as .app bundle
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          ./scripts/package-app.sh \
            --version "$VERSION" \
            --cli-binary airlock-darwin-universal \
            --output build
          ditto -c -k --sequesterRsrc --keepParent build/Airlock.app "AirlockApp-macOS.zip"

      - name: Package CLI binaries
        run: |
          tar czf airlock-darwin-arm64.tar.gz airlock-darwin-arm64
          tar czf airlock-darwin-amd64.tar.gz airlock-darwin-amd64
          tar czf airlock-darwin-universal.tar.gz airlock-darwin-universal
          tar czf airlock-linux-amd64.tar.gz airlock-linux-amd64

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          gh release create "v${VERSION}" \
            --title "Airlock v${VERSION}" \
            --generate-notes \
            "AirlockApp-macOS.zip#Airlock GUI (macOS, universal)" \
            "airlock-darwin-universal.tar.gz#CLI (macOS, universal)" \
            "airlock-darwin-arm64.tar.gz#CLI (macOS, Apple Silicon)" \
            "airlock-darwin-amd64.tar.gz#CLI (macOS, Intel)" \
            "airlock-linux-amd64.tar.gz#CLI (Linux, amd64)"
